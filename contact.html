<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="联系汤晨露 — 合作与交流">
  <title>联系 — 汤晨露</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-header { padding: calc(var(--nav-height) + 5rem) clamp(1.5rem, 5vw, 4rem) 3rem; max-width: var(--max-width); margin: 0 auto; }
    .page-header__label { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.8rem; }
    .page-header__title { font-size: clamp(3rem, 8vw, 6rem); font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
  </style>
</head>
<body>
  <nav class="nav" id="nav">
    <a href="index.html#hero" class="nav__logo">Tang Chenlu</a>
    <ul class="nav__links">
      <li><a href="index.html" class="nav__link">Home</a></li>
      <li><a href="index.html#gallery" class="nav__link">Works</a></li>
      <li><a href="index.html#about" class="nav__link">About</a></li>
      <li><a href="index.html#contact" class="nav__link">Contact</a></li>
    </ul>
    <button class="nav__menu-btn" aria-label="Menu"><span></span><span></span></button>
  </nav>
  <div class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav__close" aria-label="Close">&times;</button>
    <a href="index.html" class="mobile-nav__link">Home</a>
    <a href="index.html#gallery" class="mobile-nav__link">Works</a>
    <a href="index.html#about" class="mobile-nav__link">About</a>
    <a href="index.html#contact" class="mobile-nav__link">Contact</a>
  </div>

  <header class="page-header">
    <p class="page-header__label">Contact</p>
    <h1 class="page-header__title">联系我</h1>
  </header>

  <section class="contact" style="padding-top: 0;">
    <div class="contact__layout">
      <form class="contact__form" id="contact-form" data-animate>
        <div class="form-group">
          <label class="form-label" for="name">Name</label>
          <input class="form-input" type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="subject">Subject</label>
          <input class="form-input" type="text" id="subject" name="subject" placeholder="Commission / Collaboration" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="message">Message</label>
          <textarea class="form-textarea" id="message" name="message" placeholder="Tell me about your project..." required></textarea>
        </div>
        <button type="submit" class="btn btn--primary">Send Message</button>
      </form>

      <div class="contact__info" data-animate>
        <div class="contact__detail">
          <p class="contact__detail-label">Email</p>
          <a href="mailto:hello@tangchenlu.art" class="contact__detail-value">hello@tangchenlu.art</a>
        </div>
        <div class="contact__detail">
          <p class="contact__detail-label">Xiaohongshu</p>
          <a href="https://www.xiaohongshu.com/user/profile/6369948293" class="contact__detail-value" target="_blank" rel="noopener">汤晨露 / ID: 6369948293</a>
        </div>
        <div class="contact__detail">
          <p class="contact__detail-label">Location</p>
          <p class="contact__detail-value">China</p>
        </div>
        <div class="contact__socials">
          <a href="https://www.xiaohongshu.com/user/profile/6369948293" class="social-link" target="_blank" rel="noopener" title="Xiaohongshu">红</a>
          <a href="mailto:hello@tangchenlu.art" class="social-link" title="Email">@</a>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 汤晨露. All rights reserved.</p>
    <div class="footer__links">
      <a href="https://www.xiaohongshu.com/user/profile/6369948293" class="footer__link" target="_blank" rel="noopener">Xiaohongshu</a>
      <a href="mailto:hello@tangchenlu.art" class="footer__link">Email</a>
    </div>
  </footer>

  <script src="js/navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof initNavigation === 'function') initNavigation();
      const els = document.querySelectorAll('[data-animate]');
      if (els.length > 0 && window.IntersectionObserver) {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-visible'); obs.unobserve(e.target); } });
        }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
        els.forEach(el => obs.observe(el));
      }
      // Contact form
      const form = document.getElementById('contact-form');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const btn = form.querySelector('.btn');
          const orig = btn.textContent;
          btn.textContent = 'Sending...'; btn.disabled = true;
          setTimeout(() => {
            btn.textContent = 'Sent!'; form.reset();
            setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2500);
          }, 1000);
        });
      }
    });
  </script>
</body>
</html>
