<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="汤晨露 — 插画师个人作品集">
  <title>汤晨露 — 插画师</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor" id="cursor"></div>

  <!-- Page Transition -->
  <div class="page-transition"></div>

  <!-- Organic Blob Background -->
  <div class="hero__blobs">
    <div class="hero__blob"></div>
    <div class="hero__blob"></div>
    <div class="hero__blob"></div>
    <div class="hero__blob"></div>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <a href="index.html" class="nav__logo">汤晨露</a>
    <ul class="nav__links">
      <li><a href="index.html" class="nav__link">首页</a></li>
      <li><a href="about.html" class="nav__link">关于</a></li>
      <li><a href="works.html" class="nav__link">作品</a></li>
      <li><a href="contact.html" class="nav__link">联系</a></li>
    </ul>
    <button class="nav__menu-btn" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile Navigation -->
  <div class="mobile-nav">
    <button class="mobile-nav__close" aria-label="关闭">✕</button>
    <a href="index.html" class="mobile-nav__link">首页</a>
    <a href="about.html" class="mobile-nav__link">关于</a>
    <a href="works.html" class="mobile-nav__link">作品</a>
    <a href="contact.html" class="mobile-nav__link">联系</a>
  </div>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero__content">
      <p class="hero__greeting">你好，我是</p>
      <h1 class="hero__name">汤晨露</h1>
      <p class="hero__title">插画师 / 视觉创作者</p>
      <p class="hero__description">
        以画笔为媒介，在纸页与像素之间捕捉光影流转的瞬间。
        相信每一幅画作都是一次与世界的温柔对话。
      </p>
      <div class="hero__cta">
        <a href="works.html" class="btn btn--primary btn--arrow">欣赏作品</a>
        <a href="contact.html" class="btn btn--ghost">取得联系</a>
      </div>
    </div>

    <div class="hero__scroll">
      <span>向下探索</span>
      <div class="hero__scroll-line"></div>
    </div>
  </section>

  <!-- Featured Works -->
  <section class="section">
    <p class="section__label" data-animate>精选作品</p>
    <h2 class="section__title" data-animate>近期创作</h2>

    <div class="featured-grid">
      <article class="featured-card" data-animate>
        <div class="featured-card__image">
          <span class="featured-card__image-placeholder">春</span>
        </div>
        <div class="featured-card__info">
          <p class="featured-card__medium">水彩 · 2026</p>
          <h3 class="featured-card__title">春日絮语</h3>
          <p class="featured-card__desc">
            以细腻的湿画法捕捉初春庭院中光影斑驳的宁静午后。
          </p>
        </div>
      </article>

      <article class="featured-card" data-animate>
        <div class="featured-card__image">
          <span class="featured-card__image-placeholder">梦</span>
        </div>
        <div class="featured-card__info">
          <p class="featured-card__medium">数字绘画 · 2025</p>
          <h3 class="featured-card__title">梦境漫游</h3>
          <p class="featured-card__desc">
            探索潜意识边界的系列插画，用柔和的色块勾勒梦的轮廓。
          </p>
        </div>
      </article>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer__copy">&copy; 2026 汤晨露. All rights reserved.</p>
    <div class="footer__links">
      <a href="https://www.xiaohongshu.com/user/profile/6369948293" class="footer__link" target="_blank" rel="noopener">小红书</a>
      <a href="mailto:hello@tangchenlu.art" class="footer__link">Email</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
